<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk & Reward Calculator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            width: 100%;
            box-sizing: border-box;
        }

        h2 {
            margin: 0 0 20px 0;
            color: #333;
            font-size: 1.3rem;
            text-align: center;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccd0d4;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .radio-group {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .results-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .result-box {
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            color: white;
        }

        .risk-box {
            background: #e11d48;
        }

        /* Red */
        .profit-box {
            background: #10b981;
        }

        /* Green */
        .lot-box {
            background: #1a1a1b;
            grid-column: span 2;
            position: relative;
        }

        .pip-box {
            background: #6366f1;
        }

        .rr-box {
            background: #facc15;
            color: #000;
        }

        .rr-box .lbl,
        .rr-box .val {
            color: #000;
            opacity: 1;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            border-radius: 5px;
            padding: 3px 8px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: background 0.15s;
        }

        .copy-btn:hover {
            background: rgba(255,255,255,0.28);
        }

        .val {
            font-size: 1.6rem;
            font-weight: 800;
            display: block;
        }

        .lbl {
            font-size: 0.75rem;
            text-transform: uppercase;
            opacity: 0.9;
            font-weight: bold;
        }

        .rr-badge {
            background: #facc15;
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
            margin-top: 5px;
            display: inline-block;
        }

        .calc-btn {
            padding: 16px 0;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            background: #f0f0f0;
            color: #222;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.15s;
        }

        .calc-btn:hover {
            background: #e5e7eb;
        }

        #calc-card:focus {
            box-shadow: 0 8px 24px rgba(2, 82, 157, .4);
        }

        .clock-label {
            display: inline-block;
            width: 90px;
            font-weight: bold;
            color: #333;
        }

        .clock-time {
            font-family: 'Segoe UI Mono', 'Consolas', monospace;
            font-size: 1.1rem;
            margin-left: 12px;
            color: #1a1a1b;
        }
    </style>
</head>

<body>

    <div style="display: flex; flex-wrap: wrap; gap: 32px; width: 100%; max-width: 1100px; margin: 0 auto; align-items: flex-start;">
        <div class="card" style="flex: 2 1 0; min-width: 320px;">
            <h2>Lot Size Calculator</h2>
            <div class="group">
                <label>Account Balance ($)</label>
                <input type="number" id="balance" value="300" oninput="calculate()">
            </div>
            <div class="group">
                <label>Risk Method</label>
                <div class="radio-group">
                    <label class="radio-option"><input type="radio" name="riskType" value="usd" checked onclick="calculate()"> Fixed $</label>
                    <label class="radio-option"><input type="radio" name="riskType" value="percent" onclick="calculate()"> % of Bal</label>
                </div>
                <input type="number" id="riskValue" value="20" oninput="calculate()">
            </div>
            <div style="display: flex; gap: 15px;">
                <div class="group" style="flex: 1;">
                    <label>Stop Loss (Pips)</label>
                    <input type="number" id="stopLoss" value="12.5" step="0.1" oninput="calculate()">
                </div>
                <div class="group" style="flex: 1;">
                    <label>Target (Pips)</label>
                    <input type="number" id="targetPips" value="31.0" step="0.1" oninput="calculate()">
                </div>
            </div>
            <div class="group">
                <label>Asset Type</label>
                <select id="pairType" onchange="calculate()">
                    <optgroup label="── Forex Majors ──">
                        <option value="10">EURUSD, GBPUSD, AUDUSD, NZDUSD ($10/pip)</option>
                        <option value="7" id="opt-jpy">JPY Pairs — USDJPY, EURJPY, GBPJPY (~$7/pip)</option>
                        <option value="7.25" id="opt-usdcad">USDCAD (~$7.25/pip, approx)</option>
                        <option value="11.50" id="opt-usdchf">USDCHF (~$11.50/pip, approx)</option>
                    </optgroup>
                    <optgroup label="── Commodities ──">
                        <option value="1">Gold — XAUUSD ($1/pip)</option>
                        <option value="5">Silver — XAGUSD ($5/pip)</option>
                        <option value="10">Oil — USOIL / BRENT ($10/pip)</option>
                    </optgroup>
                </select>
                <div id="rates-status" style="font-size:0.75rem; margin-top:6px; color:#aaa;">Fetching live rates...</div>
            </div>
            <div class="group">
                <label>Contract Size</label>
                <select id="contractSize" onchange="calculate()">
                    <option value="1">Standard (100k units)</option>
                    <option value="10">Mini (10k units)</option>
                    <option value="100" selected>Micro (1k units)</option>
                </select>
            </div>
            <div class="results-container">
                <div class="result-box lot-box">
                    <button class="copy-btn" onclick="copyLot(this)" title="Copy lot size">COPY</button>
                    <span class="lbl">Recommended Lot Size</span>
                    <span class="val" id="lotOutput">16.00</span>
                </div>
                <div class="result-box risk-box">
                    <span class="lbl">Risk Amount</span>
                    <span class="val" id="riskOutput">$20.00</span>
                </div>
                <div class="result-box profit-box">
                    <span class="lbl">Potential Profit</span>
                    <span class="val" id="profitOutput">$49.60</span>
                </div>
                <div class="result-box pip-box">
                    <span class="lbl">Pip Value / Lot</span>
                    <span class="val" id="pipValOutput">$0.10</span>
                </div>
                <div class="result-box rr-box">
                    <span class="lbl">R:R Ratio</span>
                    <span class="val" id="rrOutput">1:2.48</span>
                </div>
            </div>
        </div>
        <div style="flex: 1 1 280px; min-width: 280px; display: flex; flex-direction: column; gap: 24px;">
            <div class="card" id="calc-card" tabindex="0" style="display: flex; flex-direction: column; align-items: center; outline: none;">
            <h2>Calculator</h2>
            <div id="calc-display" style="width: 100%; background: #f8f9fa; border-radius: 8px; padding: 18px 12px; font-size: 1.5rem; text-align: right; margin-bottom: 18px; min-height: 36px; box-sizing: border-box; word-break: break-all;">0</div>
            <div style="width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
                <button class="calc-btn" onclick="calcInput('7')">7</button>
                <button class="calc-btn" onclick="calcInput('8')">8</button>
                <button class="calc-btn" onclick="calcInput('9')">9</button>
                <button class="calc-btn" onclick="calcInput('/')">÷</button>
                <button class="calc-btn" onclick="calcInput('4')">4</button>
                <button class="calc-btn" onclick="calcInput('5')">5</button>
                <button class="calc-btn" onclick="calcInput('6')">6</button>
                <button class="calc-btn" onclick="calcInput('*')">×</button>
                <button class="calc-btn" onclick="calcInput('1')">1</button>
                <button class="calc-btn" onclick="calcInput('2')">2</button>
                <button class="calc-btn" onclick="calcInput('3')">3</button>
                <button class="calc-btn" onclick="calcInput('-')">−</button>
                <button class="calc-btn" onclick="calcInput('0')">0</button>
                <button class="calc-btn" onclick="calcInput('.')">.</button>
                <button class="calc-btn" onclick="calcEquals()">=</button>
                <button class="calc-btn" onclick="calcInput('+')">+</button>
                <button class="calc-btn" onclick="calcClear()" style="grid-column: span 4; background: #e11d48; color: #fff;">C</button>
            </div>
        </div>
        <div class="card" style="">
            <h2 style="margin-bottom: 16px;">Market Clocks</h2>
            <div id="market-times" style="display: flex; flex-direction: column; gap: 12px;">
                <div><span class="clock-label">New York</span><span class="clock-time" id="clock-ny">--:--:--</span></div>
                <div><span class="clock-label">London</span><span class="clock-time" id="clock-london">--:--:--</span></div>
                <div><span class="clock-label">Tokyo</span><span class="clock-time" id="clock-tokyo">--:--:--</span></div>
                <div><span class="clock-label">Sydney</span><span class="clock-time" id="clock-sydney">--:--:--</span></div>
            </div>
        </div>

        </div>

    </div>

    <script>
        // Market clocks logic
        function updateMarketClocks() {
            const now = new Date();
            const markets = [
                { id: 'clock-ny',     tz: 'America/New_York' },
                { id: 'clock-london', tz: 'Europe/London' },
                { id: 'clock-tokyo',  tz: 'Asia/Tokyo' },
                { id: 'clock-sydney', tz: 'Australia/Sydney' }
            ];
            markets.forEach(market => {
                const timeStr = now.toLocaleTimeString('en-US', {
                    timeZone: market.tz,
                    hour: 'numeric',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: true
                });
                document.getElementById(market.id).innerText = timeStr;
            });
        }
        setInterval(updateMarketClocks, 1000);
        updateMarketClocks();
        // Keyboard support for calculator
        const calcCard = document.getElementById('calc-card');
        calcCard.addEventListener('keydown', function (e) {
            const key = e.key;
            if ((key >= '0' && key <= '9') || key === '.') {
                calcInput(key);
                e.preventDefault();
            } else if (key === '+' || key === '-' || key === '*' || key === '/') {
                calcInput(key);
                e.preventDefault();
            } else if (key === 'Enter' || key === '=') {
                calcEquals();
                e.preventDefault();
            } else if (key === 'Backspace') {
                if (calcCurrent.length > 0) {
                    calcCurrent = calcCurrent.slice(0, -1);
                    document.getElementById('calc-display').innerText = calcCurrent || '0';
                }
                e.preventDefault();
            } else if (key === 'c' || key === 'C' || key === 'Escape') {
                calcClear();
                e.preventDefault();
            }
        });
        // Focus calculator on click for keyboard use
        calcCard.addEventListener('click', function () {
            calcCard.focus();
        });
        // Simple calculator logic
        let calcCurrent = '';
        let calcResultShown = false;
        function calcInput(val) {
            if (calcResultShown && /[0-9.]/.test(val)) {
                calcCurrent = '';
                calcResultShown = false;
            }
            if (calcCurrent === '' && /[+\-*/.]/.test(val) && val !== '-') return;
            calcCurrent += val;
            document.getElementById('calc-display').innerText = calcCurrent;
        }
        function calcEquals() {
            try {
                let result = eval(calcCurrent.replace(/[^0-9+\-*/.]/g, ''));
                if (typeof result === 'number' && isFinite(result)) {
                    document.getElementById('calc-display').innerText = result;
                    calcCurrent = result.toString();
                    calcResultShown = true;
                } else {
                    document.getElementById('calc-display').innerText = 'Error';
                    calcCurrent = '';
                }
            } catch {
                document.getElementById('calc-display').innerText = 'Error';
                calcCurrent = '';
            }
        }
        function calcClear() {
            calcCurrent = '';
            document.getElementById('calc-display').innerText = '0';
        }
        function copyLot(btn) {
            const val = document.getElementById('lotOutput').innerText;
            navigator.clipboard.writeText(val).then(() => {
                const orig = btn.innerText;
                btn.innerText = 'COPIED!';
                setTimeout(() => { btn.innerText = orig; }, 1500);
            });
        }
        function calculate() {
            const balance = parseFloat(document.getElementById('balance').value) || 0;
            const riskValue = parseFloat(document.getElementById('riskValue').value) || 0;
            const slPips = parseFloat(document.getElementById('stopLoss').value) || 0;
            const tpPips = parseFloat(document.getElementById('targetPips').value) || 0;
            const pipValPerStdLot = parseFloat(document.getElementById('pairType').value);
            const riskType = document.querySelector('input[name="riskType"]:checked').value;
            const contractMultiplier = parseFloat(document.getElementById('contractSize').value);

            let riskUSD = riskType === 'percent' ? (balance * (riskValue / 100)) : riskValue;

            if (slPips > 0 && riskUSD > 0) {
                // 1. Calculate Lot Size with multiplier
                const lotSize = ((riskUSD / slPips) / pipValPerStdLot) * contractMultiplier;

                // 2. Calculate Profit based on actual lot size
                // Divide lotSize by multiplier to get standard lot equivalent
                const potentialProfit = (lotSize / contractMultiplier) * tpPips * pipValPerStdLot;

                // 3. Risk to Reward Ratio
                const rr = tpPips / slPips;

                const pipValuePerLot = pipValPerStdLot / contractMultiplier;

                document.getElementById('lotOutput').innerText = lotSize.toFixed(2);
                document.getElementById('pipValOutput').innerText = `$${pipValuePerLot.toFixed(2)}`;
                document.getElementById('riskOutput').innerText = `$${riskUSD.toFixed(2)}`;
                document.getElementById('profitOutput').innerText = `$${potentialProfit.toFixed(2)}`;
                document.getElementById('rrOutput').innerText = `1:${rr.toFixed(2)}`;
            }
        }
        calculate();

        async function fetchLiveRates() {
            const status = document.getElementById('rates-status');
            try {
                const res = await fetch('https://api.frankfurter.app/latest?from=USD&to=CAD,CHF,JPY');
                if (!res.ok) throw new Error('Network error');
                const data = await res.json();
                const { CAD, CHF, JPY } = data.rates;

                const jpyPip = 1000 / JPY;
                const cadPip = 10 / CAD;
                const chfPip = 10 / CHF;

                const optJpy = document.getElementById('opt-jpy');
                optJpy.value = jpyPip.toFixed(4);
                optJpy.textContent = `JPY Pairs — USDJPY, EURJPY, GBPJPY ($${jpyPip.toFixed(2)}/pip, live)`;

                const optCad = document.getElementById('opt-usdcad');
                optCad.value = cadPip.toFixed(4);
                optCad.textContent = `USDCAD ($${cadPip.toFixed(2)}/pip, live)`;

                const optChf = document.getElementById('opt-usdchf');
                optChf.value = chfPip.toFixed(4);
                optChf.textContent = `USDCHF ($${chfPip.toFixed(2)}/pip, live)`;

                status.textContent = `Live rates loaded (${data.date}) — JPY, CAD, CHF pip values updated`;
                status.style.color = '#10b981';
                calculate();
            } catch (e) {
                status.textContent = 'Live rates unavailable — using static estimates';
                status.style.color = '#e11d48';
            }
        }
        fetchLiveRates();
    </script>

</body>

</html>
